version: "3"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
  
  caddy:
      image: caddy:latest
      volumes:
        - ./Caddyfile:/etc/caddy/Caddyfile
      ports:
        - "80:80"
        - "443:443"